<mat-toolbar color="primary">
  <span>Issue Dashboard</span>
</mat-toolbar>

<div class="container">
  <table mat-table [dataSource]="(issues$ | async) || []" class="mat-elevation-z8 full-width">

    <!-- ID Column -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef> ID </th>
      <td mat-cell *matCellDef="let issue"> {{ issue.id }} </td>
    </ng-container>

    <!-- Title Column -->
    <ng-container matColumnDef="title">
      <th mat-header-cell *matHeaderCellDef> Title </th>
      <td mat-cell *matCellDef="let issue"> {{ issue.title }} </td>
    </ng-container>

    <!-- Status Column -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef> Status </th>
      <td mat-cell *matCellDef="let issue"> {{ issue.status }} </td>
    </ng-container>

    <!-- Created By -->
    <ng-container matColumnDef="createdBy">
      <th mat-header-cell *matHeaderCellDef> Created By </th>
      <td mat-cell *matCellDef="let issue"> {{ issue.createdBy?.name }} </td>
    </ng-container>

    <!-- Created At -->
    <ng-container matColumnDef="createdAt">
      <th mat-header-cell *matHeaderCellDef> Created At </th>
      <td mat-cell *matCellDef="let issue"> {{ issue.createdAt | date:'short' }} </td>
    </ng-container>

    <!-- Updated At -->
    <ng-container matColumnDef="updatedAt">
      <th mat-header-cell *matHeaderCellDef> Updated At </th>
      <td mat-cell *matCellDef="let issue"> {{ issue.updatedAt | date:'short' }} </td>
    </ng-container>

    <!-- Assigned To -->
    <ng-container matColumnDef="assignedTo">
      <th mat-header-cell *matHeaderCellDef> Assigned To </th>
      <td mat-cell *matCellDef="let issue"> {{ issue.assignedTo?.name }} </td>
    </ng-container>

  <ng-container matColumnDef="description">
  <th mat-header-cell *matHeaderCellDef> Description </th>
  <td mat-cell *matCellDef="let issue">
    <button mat-button color="primary" (click)="openDescription(issue)">
      View
    </button>
  </td>
</ng-container>


    <!-- Actions Column -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Actions </th>
      <td mat-cell *matCellDef="let issue">
        <button mat-icon-button color="primary" (click)="updateStatus(issue.id, 'IN_PROGRESS')">
          <mat-icon>autorenew</mat-icon>
        </button>
        <button mat-icon-button color="accent" (click)="updateStatus(issue.id, 'CLOSED')">
          <mat-icon>check_circle</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="deleteIssue(issue.id)">
          <mat-icon>delete</mat-icon>
        </button>
        
        <button mat-icon-button color="primary" (click)="openComments(issue)">
         <mat-icon>comment</mat-icon>
    </button>
      </td>
       <th mat-header-cell *matHeaderCellDef> Comments </th>
       <td>
        
       </td>
    </ng-container>

    <!-- Table Rows -->
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let issue; columns: displayedColumns;"></tr>
  </table>

 

  </div>
